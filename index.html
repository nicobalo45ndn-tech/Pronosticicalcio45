<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronosticicalcio45</title>

<style>
body { font-family: Arial; background:#f5f6fa; margin:0;}
header { background:#0a3d62; color:white; padding:15px; text-align:center; font-size:22px;}
.match { background:white; margin:12px; padding:12px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
button { background:#e58e26; color:white; border:none; padding:8px; border-radius:5px; margin-top:8px;}
</style>

</head>
<body>

<header>Pronosticicalcio45</header>

<div id="matches">Caricamento partite...</div>

<script>

async function loadMatches(){

let url = "https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard";

let res = await fetch(url);
let data = await res.json();

let html = "";

data.events.forEach(e => {

let home = e.competitions[0].competitors[0].team.displayName;
let away = e.competitions[0].competitors[1].team.displayName;

let homeScore = e.competitions[0].competitors[0].score;
let awayScore = e.competitions[0].competitors[1].score;

let prob = Math.random(); // algoritmo base temporaneo

let bet = prob > 0.66 ? "1" : prob > 0.33 ? "X" : "2";

html += `
<div class="match">
<h3>${home} vs ${away}</h3>
<p>Risultato attuale: ${homeScore} - ${awayScore}</p>
<button onclick="alert('Pronostico AI: ${bet}')">Pronostico</button>
</div>
`;

});

document.getElementById("matches").innerHTML = html;

}

loadMatches();

</script>

</body>
</html>
